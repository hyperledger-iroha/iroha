[package]
name = "export_norito_fixtures"
version = "0.1.0"
edition = "2024"
publish = false
default-run = "export_norito_fixtures"

[features]
default = []
kaigi-fixtures = []

[dependencies]
anyhow = "1.0.100"
base64 = { version = "0.22.1", default-features = false, features = ["std"] }
clap = { version = "4.5.51", features = ["derive"] }
hex = { version = "0.4.3", default-features = false }
iroha_crypto = { path = "../../crates/iroha_crypto", default-features = false, features = ["std"] }
iroha_data_model = { path = "../../crates/iroha_data_model", default-features = false, features = ["json", "governance", "transparent_api"] }
norito = { path = "../../crates/norito", features = ["json"] }
time = { version = "0.3.44", default-features = false, features = ["std", "macros", "formatting"] }
iroha_schema = { path = "../../crates/iroha_schema" }
iroha_primitives = { path = "../../crates/iroha_primitives" }
sha2 = { version = "0.10.9", default-features = false, features = ["std"] }

[workspace]

[patch.crates-io]
halo2-axiom = { path = "../../vendor/halo2-axiom" }
halo2curves-axiom = { path = "../../vendor/halo2curves-axiom" }
rust_decimal = { path = "../../vendor/rust_decimal" }
"vergen-git2" = { path = "../../vendor/vergen-git2" }
find_cuda_helper = { path = "../../vendor/find_cuda_helper" }
writeable = { path = "../../vendor/writeable" }
document-features = { path = "../../vendor/document-features" }
indoc = { path = "../../vendor/indoc" }
is-terminal = { path = "../../vendor/is-terminal" }
darling = { path = "../../vendor/darling-0.22.0/darling-0.22.0" }
darling_core = { path = "../../vendor/darling_core-0.22.0/darling_core-0.22.0" }
darling_macro = { path = "../../vendor/darling_macro-0.22.0/darling_macro-0.22.0" }
#streebog = { path = "../../vendor/streebog" }
#opus = { path = "../../vendor/opus_stub" }
pasta_curves = { path = "../../vendor/pasta_curves" }
#icrate = { path = "../../vendor/icrate" }
