[package]
name = "sm3-neon"
version = "0.1.0"
edition = "2024"
license = "Apache-2.0"
description = "NEON helpers for SM3 hashing used by Iroha"
publish = false
readme = "README.md"

[features]
default = []
force-neon = []

[dependencies]
sm3 = "0.5.0-rc.1"

[dev-dependencies]
criterion = { workspace = true }
rand = { version = "0.9.2", default-features = false, features = ["std", "std_rng", "alloc"] }
hex-literal = "1.1.0"
