[package]
name = "ivm"
version.workspace = true
edition = "2024"
authors = ["Iroha Contributors"]
description = "Iroha Virtual Machine implementation"
license = "Apache-2.0"
repository = "https://github.com/hyperledger/ivm"
documentation = "https://docs.rs/ivm"
build = "build.rs"

[dependencies]
poseidon-primitives = "0.2.0"
sha2 = { version = "0.10.9" }
ff = { version = "0.13.1", features = ["derive"] }
halo2curves = { workspace = true }
halo2_proofs = { version = "0.5.1", package = "halo2-axiom", features = ["batch", "multicore"] }
rayon = "1.11.0"
num_cpus = "1.17.0"
# Security: RUSTSEC-2025-0024 requires >=0.5.15
crossbeam-channel = "0.5.15"
dashmap = "6.1.0"
likely_stable = "0.1.3"
parking_lot = "0.12.5"
indexmap = "2.12.0"
iroha_data_model = { path = "../iroha_data_model", default-features = false, features = ["transparent_api", "json", "governance"] }
iroha_crypto = { path = "../iroha_crypto", features = ["rayon", "sm"] }
norito = {path = "../norito"}
iroha_zkp_halo2 = { path = "../iroha_zkp_halo2" }
iroha_primitives = { path = "../iroha_primitives" }
iroha_telemetry = { path = "../iroha_telemetry", features = ["metric-instrumentation"] }
iroha_i18n = { path = "../iroha_i18n" }
nonzero_ext = { workspace = true }
## Do not depend on serde/serde_json directly; use `norito::json` helpers instead.
## serde and serde_json are pulled in via `norito` internally when needed.
hex = { workspace = true }
base64 = { workspace = true }
ed25519-dalek = "2.2.0"
curve25519-dalek = "4.1.3"
rand_core = "0.9.3"
pqcrypto-dilithium = { version = "0.5" }
pqcrypto-traits = { version = "0.3.5" }
blstrs = "0.7.1"
group = "0.13"
pairing = "0.23"
crypto-bigint = "0.6.1"
rodio = { version = "0.21.1", optional = true }
k256 = { version = "0.13.4", features = ["ecdsa"] }
signature = "2.2.0"
cust = { version = "0.3.2", optional = true }
proptest = { version = "1.9.0", optional = true, default-features = false, features = ["std"] }

[target.'cfg(target_arch = "x86_64")'.dependencies]
sha2 = { version = "0.10.9", features = ["asm"] }

[target.'cfg(target_os = "macos")'.dependencies]
objc2-metal = { version = "0.3.2", optional = true }
objc2 = { version = "0.6.3", optional = true }
objc2-foundation = { version = "0.3.2", optional = true }


[dev-dependencies]
criterion = { workspace = true }
tiny-keccak = { version = "2.0.2", features = ["keccak"] }
hex-literal = "1.1.0"

[features]
# Compile-time toggles remain only for external acceleration backends that pull
# in platform-specific dependencies. CPU SIMD backends are always built and
# selected at runtime based on hardware capabilities.
# - `metal`: enables Apple Metal GPU kernels on macOS. Ignored on other OSes.
# - `cuda`: enables CUDA PTX kernels when available. Falls back to CPU otherwise.
default = ["halo2"]
## Hardware transactional memory experiments on x86_64 (requires nightly RTM intrinsics).
htm = []
beep = ["dep:rodio"]
cuda = ["dep:cust"]
# Chinese national crypto (SM2/SM3/SM4)
sm = ["iroha_crypto/sm"]
# JSON parsing in tests and host helpers should use `norito::json` wrappers,
# avoiding direct serde usage. No feature gating is required.
metal = [
    # macOS-only optional deps, no-ops on other targets
    "dep:objc2-metal",
    "dep:objc2",
    "dep:objc2-foundation",
]
## Expose the optional circuit-params hook from halo2. Enabled when downstream
## users compile us alongside backends that expect the associated `Params` type.
halo2-params = []
kotodama_dynamic_bounds = []
## Allow development fallback behavior for schema decode helpers when a registry
## implementation is incomplete. Disable this in strict/production builds.
schema_fallback = []
## Placeholder feature to switch to an incremental Merkle update path for
## the register file once `iroha_crypto` exposes a canonical builder.
merkle_incremental = []
## Accepts Norito derive internal cfg used to pick schema-hash strategy.
## This is a noop here; present only to silence unexpected-cfg warnings from
## proc-macros that reference `feature = "schema-structural"`.
schema-structural = []
## Dev-only: enable property-based testing skeleton in tests. No deps added by default.
ivm_prop = ["dep:proptest"]
## Dev-only test gate used by poseidon_simd.rs; declared to silence unexpected-cfg warnings.
ivm_zk_tests = []
## Dev-only test gate used by vrf_verify_chain.rs; declared to silence unexpected-cfg warnings.
ivm_vrf_tests = []
halo2 = []
goldilocks_backend = ["iroha_zkp_halo2/goldilocks_backend"]

