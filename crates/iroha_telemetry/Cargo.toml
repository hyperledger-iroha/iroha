[package]
name = "iroha_telemetry"

edition.workspace = true
version.workspace = true
authors.workspace = true

build = "../build-support/script.rs"

license.workspace = true

[lints]
workspace = true

[features]
# Support developer-specific telemetry.
# Should not be enabled on production builds.
dev-telemetry = []
# Export Prometheus metrics. See https://prometheus.io/.
metric-instrumentation = ["iroha_telemetry_derive/metric-instrumentation"]
telegram = ["dep:reqwest"]
otel-exporter = [
    "dep:opentelemetry",
    "dep:opentelemetry_sdk",
    "dep:opentelemetry_otlp",
]

[dependencies]
norito = {workspace = true}
iroha_telemetry_derive = { path = "../iroha_telemetry_derive" }

iroha_config = { workspace = true }
iroha_logger = { workspace = true }
iroha_futures = { workspace = true, features = ["telemetry"] }
iroha_schema = { workspace = true }
iroha_data_model = { workspace = true }

async-trait = { workspace = true }
chrono = "0.4.38"
eyre = { workspace = true }
futures = { workspace = true, features = ["std", "async-await"] }
streaming-stats = "0.2.3"
tokio = { workspace = true, features = ["rt", "rt-multi-thread", "macros"] }
tokio-stream = { workspace = true, features = ["fs", "sync"] }
tokio-tungstenite = { workspace = true }
url = { workspace = true }
prometheus = { workspace = true }
reqwest = { version = "0.12.24", default-features = false, features = ["json", "rustls-tls-native-roots"], optional = true }
opentelemetry = { version = "0.31", default-features = false, features = ["metrics"], optional = true }
opentelemetry_sdk = { version = "0.31", default-features = false, features = ["metrics", "rt-tokio"], optional = true }
opentelemetry_otlp = { package = "opentelemetry-otlp", version = "0.31", default-features = false, features = ["metrics", "grpc-tonic"], optional = true }
blake3 = { workspace = true }
thiserror = { workspace = true }
hex = { workspace = true }

[build-dependencies]
build-support = { path = "../build-support", default-features = false }

[dev-dependencies]
expect-test = { workspace = true }
