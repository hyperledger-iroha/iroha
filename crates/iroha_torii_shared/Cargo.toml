[package]
name = "iroha_torii_shared"

edition.workspace = true
version.workspace = true
authors.workspace = true

description.workspace = true
repository.workspace = true
homepage.workspace = true
documentation.workspace = true

license.workspace = true
keywords.workspace = true
categories.workspace = true

[lints]
workspace = true

[dependencies]
norito.workspace = true
iroha_crypto = { workspace = true, default-features = false, features = [] }
iroha_data_model = { workspace = true, default-features = false, features = [] }
blake3.workspace = true
rand.workspace = true
hex.workspace = true
hkdf = "0.12.4"
sha2 = { version = "0.10.9", default-features = false }
blake2 = { version = "0.10.6", default-features = false }

[dev-dependencies]
tokio = { workspace = true, features = ["macros", "rt-multi-thread"] }
reqwest = { version = "0.12.24", default-features = false, features = ["rustls-tls-native-roots"] }
tokio-tungstenite = { workspace = true, features = ["rustls-tls-native-roots"] }
tungstenite = { workspace = true }
futures-util = { version = "0.3.31" }
base64 = { workspace = true }
anyhow = "1.0.100"
hex = { workspace = true }

[features]
default = []
# Allow norito derive macros to detect optional packed-struct layout without
# tripping unexpected-cfg checks in this destination crate.
packed-struct = []
# Enable Connect examples (WS demo) gating to avoid unexpected-cfg warnings
connect = []
