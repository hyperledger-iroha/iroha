[package]
name = "iroha_primitives"

edition.workspace = true
version.workspace = true
authors.workspace = true

license.workspace = true

[lints]
workspace = true

[badges]
is-it-maintained-issue-resolution = { repository = "https://github.com/hyperledger-iroha/iroha" }
is-it-maintained-open-issues = { repository = "https://github.com/hyperledger-iroha/iroha" }
maintenance = { status = "actively-developed" }

# Enable JSON helpers backed by Norito.
[features]
default = ["json"]
# Enable JSON helpers backed by Norito.
json = []
# Replace structures and methods with FFI equivalents to facilitate dynamic linkage (mainly used in smartcontracts)
#ffi_import = ["iroha_ffi", "rust_decimal/c-repr"]

# Expose FFI API for dynamic linking (Internal use only)
ffi_export = ["iroha_ffi", "rust_decimal/c-repr"]

trybuild-tests = []
# Recognize `packed-struct` used in derives from norito/norito_derive to silence
# unexpected-cfg warnings during check-cfg linting. No behavior change.
packed-struct = []
simd-accel = []

[dependencies]
norito = {workspace = true}
iroha_primitives_derive = { path = "../iroha_primitives_derive" }

iroha_macro = { workspace = true }
iroha_schema = { workspace = true }
iroha_ffi = { workspace = true, optional = true }
rust_decimal = { workspace = true }
blake3 = { workspace = true }

derive_more = { workspace = true, features = ["display", "debug", "from", "as_ref", "deref", "constructor", "into_iterator"] }
smallvec = { version = "1.15.1", default-features = false, features = ["union"] }
smallstr = { version = "0.3.1", default-features = false, features = ["union"] }
thiserror = { workspace = true }
displaydoc = { workspace = true, features = ["std"] }
parking_lot = { workspace = true }
num-bigint = { version = "0.4.6", default-features = false, features = ["std"] }
num-traits = { version = "0.2.19", default-features = false, features = ["std"] }


[dev-dependencies]
criterion = { workspace = true }
proptest = "1.9.0"
trybuild = { workspace = true }

[[bench]]
name = "smallvec"
harness = false
