[package]
name = "iroha_telemetry_derive"

edition.workspace = true
version.workspace = true
authors.workspace = true

license.workspace = true

[lints]
workspace = true

[lib]
proc-macro = true

[badges]
is-it-maintained-issue-resolution = { repository = "https://github.com/hyperledger-iroha/iroha" }
is-it-maintained-open-issues = { repository = "https://github.com/hyperledger-iroha/iroha" }
maintenance = { status = "actively-developed" }

[features]
# Enable `#[metrics]` instrumentation when consumed via `iroha_telemetry`.
metric-instrumentation = []
# Test-only feature for mirroring `cfg(feature = "telemetry")` in trybuild cases.
telemetry = []
trybuild-tests = ["metric-instrumentation", "telemetry"]

[dependencies]
syn = { workspace = true }
quote = { workspace = true }
proc-macro2 = { workspace = true }
manyhow = { workspace = true }

[dev-dependencies]
trybuild = { workspace = true }
