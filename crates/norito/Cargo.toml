[package]
name = "norito"
edition.workspace = true
version.workspace = true
authors.workspace = true
license.workspace = true

[dependencies]
byteorder = "1.5"
thiserror.workspace = true
zstd.workspace = true
norito_derive = { path = "../norito_derive" }
crc64fast = "1.1"
iroha_schema.workspace = true
simdutf8 = { version = "0.1.5", optional = true }
rayon = { version = "1.11.0", optional = true }
parity-scale-codec = { version = "3.7.5", features = ["derive"], optional = true }
url.workspace = true
sha3 = "0.10.8"
sha2 = { version = "0.10.9", default-features = false, features = ["std"] }
toml.workspace = true
hkdf = "0.12.4"
chacha20poly1305 = { version = "0.11.0-rc.2", default-features = false, features = ["alloc", "getrandom", "rand_core"] }
blake3 = "1.8.2"
iroha_audio = { path = "../iroha_audio" }
rkyv = { version = "0.8.12", default-features = false, features = ["alloc", "std", "pointer_width_64"] }

[target.'cfg(all(target_os = "macos", target_arch = "aarch64"))'.dependencies]
gpuzstd_metal = { path = "../gpuzstd_metal" }

[dev-dependencies]
proptest = "1.9.0"
criterion = { workspace = true }
rand = "0.9.2"
regex = { version = "1.12.2", default-features = false, features = ["std"] }
iroha_schema = { workspace = true }

[[bench]]
name = "codec"
harness = false

[[bench]]
name = "parity_compare"
harness = false

[[bench]]
name = "iroha_tx"
harness = false

[[bench]]
name = "ncb_vs_aos"
harness = false

[[bench]]
name = "enum_ncb"
harness = false

[[bench]]
name = "enum_packed_bench"
harness = false


[[bench]]
name = "crc64_compressed"
harness = false

[[bench]]
name = "enum_indexed"
harness = false

[[bench]]
name = "stream_maps"
harness = false

[[bench]]
name = "stream_seq"
harness = false

[[bench]]
name = "json"
harness = false

[[bench]]
name = "json_stage1"
harness = false

[[bench]]
name = "json_auto"
harness = false

[[bench]]
name = "typed_vs_serde"
harness = false

[[bench]]
name = "adaptive_telemetry"
harness = false

[[bench]]
name = "streaming_rans"
harness = false

[[example]]
name = "dump_tape"

[[bin]]
name = "norito_regen_goldens"
path = "src/bin/norito_regen_goldens.rs"
[features]
default = ["derive", "compression", "columnar", "json", "json-std-io", "strict-safe"]
simd-accel = []
strict-safe = []
derive = []
compression = []
compact-len = []
gpu-compression = ["compression"]
std = []
schema-structural = ["iroha_audio/schema-structural"]
json = []
json-raw-value = []
json-std-io = []
bench-internal = []
metal-stage1 = []
cuda-stage1 = []
metal-crc64 = []
cuda-crc64 = []
streaming-neural-filter = []
streaming-fixed-point-dct = []
codec-gpu = ["codec-gpu-metal", "codec-gpu-cuda"]
codec-gpu-metal = ["metal-stage1", "metal-crc64"]
codec-gpu-cuda = ["cuda-stage1", "cuda-crc64"]
packed-seq = []
packed-struct = []
parity-scale = ["parity-scale-codec"]
simdutf8-validate = ["simdutf8"]
columnar = []
stage1-validate = []
crc-key-hash = []
parallel-stage1 = []
parallel-stage1-rayon = ["rayon", "parallel-stage1"]
adaptive-telemetry = []
adaptive-telemetry-log = ["adaptive-telemetry"]
