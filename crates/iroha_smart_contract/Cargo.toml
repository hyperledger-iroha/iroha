[package]
name = "iroha_smart_contract"

edition.workspace = true
version.workspace = true
authors.workspace = true

license.workspace = true

[lints]
workspace = true

[features]
# Enables debugging tools such as `dbg()` and `DebugUnwrapExt`
debug = ["iroha_smart_contract_utils/debug"]
trybuild-tests = []
packed-struct = []

[dependencies]
iroha_smart_contract_derive = { path = "../iroha_smart_contract_derive" }

iroha_macro.workspace = true
iroha_data_model.workspace = true
iroha_smart_contract_utils.workspace = true
iroha_smart_contract_codec.workspace = true

norito = {workspace = true}
derive_more.workspace = true

displaydoc.workspace = true

[dev-dependencies]
# Removed `webassembly-test` to eliminate compile-time failures from
# transitive `mv` crate. Tests rely solely on `trybuild` now.
trybuild = { workspace = true }
