  <text x="230" y="282" font-size="15" font-family="SanFrancisco,Helvetica,Arial,sans-serif" fill="#fff">View alias</text>
  <text x="430" y="282" font-size="13" font-family="SanFrancisco,Helvetica,Arial,sans-serif" fill="#666">help(“Copy canonical i105”) · help(“Alias points to i105”).</text>
  <rect x="520" y="95" width="150" height="150" rx="16" ry="16" fill="#000" />
  <text x="530" y="180" font-size="12" font-family="SanFrancisco,Helvetica,Arial,sans-serif" fill="#fff">i105 QR preview</text>
