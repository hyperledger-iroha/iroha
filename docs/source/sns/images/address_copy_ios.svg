<svg xmlns="http://www.w3.org/2000/svg" width="720" height="360" viewBox="0 0 720 360">
  <rect x="10" y="10" width="700" height="340" rx="32" ry="32" fill="#ffffff" stroke="#d7d7d7" stroke-width="2" />
  <text x="40" y="48" font-family="SanFrancisco,Helvetica,Arial,sans-serif" font-size="22" font-weight="600" fill="#111">iOS Norito demo — address preview card</text>
  <text x="40" y="82" font-size="14" font-family="SanFrancisco,Helvetica,Arial,sans-serif" fill="#555">Domainless account literal: render domain context separately when a workflow requires it.</text>
  <text x="40" y="110" font-size="15" font-family="SanFrancisco,Helvetica,Arial,sans-serif" fill="#444">i105 (prefix 753)</text>
  <rect x="40" y="120" width="640" height="40" rx="10" ry="10" fill="#f8f8f8" stroke="#e2e2e2" />
  <text x="50" y="147" font-family="SFMono-Regular,Consolas,monospace" font-size="14" fill="#333"><katakana-i105-account-id></text>
  <text x="40" y="175" font-size="15" font-family="SanFrancisco,Helvetica,Arial,sans-serif" fill="#444">canonical katakana i105</text>
  <rect x="40" y="185" width="640" height="40" rx="10" ry="10" fill="#f8f8f8" stroke="#e2e2e2" />
  <text x="50" y="212" font-family="SFMono-Regular,Consolas,monospace" font-size="14" fill="#333">alias@domain.dataspace</text>
  <text x="40" y="240" font-size="13" font-family="SanFrancisco,Helvetica,Arial,sans-serif" fill="#c55400">Show aliases separately. Copy and share the canonical katakana i105 literal.</text>
  <rect x="40" y="255" width="150" height="40" rx="12" ry="12" fill="#007aff" />
  <text x="60" y="282" font-size="15" font-family="SanFrancisco,Helvetica,Arial,sans-serif" fill="#fff">Copy i105</text>
