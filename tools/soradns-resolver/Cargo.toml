[package]
name = "soradns-resolver"
version = "0.1.0"
edition = "2024"
license = "Apache-2.0"
publish = false

[dependencies]
clap = { workspace = true, features = ["derive"] }
eyre = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true, features = ["fmt", "env-filter"] }
tokio = { workspace = true, features = ["rt-multi-thread", "macros", "signal", "fs", "sync", "net", "io-util"] }
futures = { workspace = true, features = ["std"] }
blake3 = { workspace = true }
norito = { workspace = true }
norito_derive = { workspace = true }
hex = { workspace = true, features = ["alloc"] }
url = { workspace = true }
once_cell = { workspace = true }
time = { workspace = true }
thiserror = { workspace = true }
reqwest = { workspace = true, features = ["rustls-tls"] }
base64 = { workspace = true, features = ["alloc"] }
axum = { workspace = true, default-features = false, features = ["http1", "json", "macros", "tokio", "tower-log", "query"] }
tokio-stream = { workspace = true, features = ["sync"] }
tokio-rustls = { workspace = true }
rustls = { version = "0.23.35", default-features = false, features = ["std"] }
hickory-proto = { version = "0.25.2", default-features = false }
quinn = "0.11.9"
iroha_primitives = { workspace = true }
iroha_data_model = { workspace = true, default-features = false, features = ["json", "governance"] }
iroha_crypto = { workspace = true }
sha2 = { version = "0.10.9", default-features = false, features = ["std"] }

[dev-dependencies]
expect-test = { workspace = true }
tokio = { workspace = true, features = ["rt", "macros", "sync", "net", "io-util"] }
tempfile = { workspace = true }
rcgen = "=0.14.5"
assert_cmd = "2.1.1"
