[package]
name = "soranet-puzzle-service"
version = "0.1.0"
edition = "2024"
authors = ["Hyperledger Iroha Contributors"]
license = "Apache-2.0"
publish = false

[dependencies]
axum = { workspace = true, features = ["tokio", "http1"] }
base64 = { workspace = true }
clap = { workspace = true, features = ["derive"] }
color-eyre = { workspace = true }
iroha_crypto = { workspace = true }
norito = { workspace = true }
rand = { workspace = true }
soranet-relay = { path = "../soranet-relay" }
soranet_pq = { workspace = true }
thiserror = { workspace = true }
tokio = { workspace = true, features = ["macros", "rt-multi-thread", "signal", "net"] }
tracing = { workspace = true }
tracing-subscriber = { workspace = true, features = ["fmt", "env-filter"] }
hex = { workspace = true }
blake3 = { workspace = true }
