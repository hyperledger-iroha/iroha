[package]
name = "soranet-relay"
version = "0.0.0"
edition = "2024"
publish = false

[package.metadata]
description = "Reference SoraNet relay daemon"

[dependencies]
clap = { version = "4.5.51", features = ["derive"] }
futures = { workspace = true, features = ["std"] }
hex = { workspace = true, features = ["alloc"] }
norito = { workspace = true }
base64 = { workspace = true }
quinn = "0.11.9"
rcgen = "=0.14.5"
rustls = { version = "0.23.35", default-features = false, features = ["std"] }
thiserror = { workspace = true }
tokio = { workspace = true, features = ["macros", "rt-multi-thread", "signal", "net", "io-util", "sync"] }
tracing = { workspace = true }
tracing-subscriber = { workspace = true, features = ["env-filter", "fmt"] }
bytes = { workspace = true }
iroha_crypto = { workspace = true }
iroha_data_model = { workspace = true, features = ["governance"] }
rand = { workspace = true, features = ["std_rng"] }
blake3 = { workspace = true }
time = { workspace = true }
iroha_primitives = { workspace = true }
sha2 = { version = "0.10.9", default-features = false, features = ["std"] }
tokio-tungstenite = { workspace = true }
ed25519-dalek = { version = "2.2.0", default-features = false, features = ["std"] }
soranet_pq = { workspace = true }
tempfile = "3.23.0"

[dev-dependencies]
