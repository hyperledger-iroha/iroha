apiVersion: v1
kind: Namespace
metadata:
  name: soranet
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: soranet-relay-config
  namespace: soranet
data:
  relay.json: |
    {
      "mode": "Entry",
      "listen": "0.0.0.0:4433",
      "admin_listen": "0.0.0.0:9090",
      "tls": {
        "self_signed_subject": "relay.soranet.local"
      },
      "pow": {
        "required": true,
        "difficulty": 16,
        "max_future_skew_secs": 600,
        "min_ticket_ttl_secs": 45
      },
      "padding": {
        "cell_size": 1024,
        "max_idle_millis": 200,
        "global_rate_limit_bytes_per_sec": 262144,
        "burst_bytes": 524288
      },
      "congestion": {
        "max_circuits_per_client": 12,
        "handshake_cooldown_millis": 250
      },
      "compliance": {
        "enable": true,
        "log_path": "/var/log/soranet/relay_compliance.jsonl",
        "hash_salt_hex": "fedcba98765432100123456789abcdef0123456789abcdef0123456789abcdef",
        "max_log_bytes": 67108864,
        "max_backup_files": 7,
        "pipeline_spool_dir": "/var/spool/soranet/audit"
      },
      "handshake": {
        "descriptor_manifest_path": "/etc/soranet/relay/secrets/relay-descriptor-manifest.json",
        "descriptor_commit_hex": "0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef",
        "kem": [
          { "id": "ml-kem-768", "required": true },
          { "id": "ml-kem-1024", "required": false }
        ],
        "signatures": [
          { "id": "dilithium3", "required": true },
          { "id": "ed25519", "required": false }
        ],
        "grease": [
          { "typ": 32528, "value_hex": "deadbeef" },
          { "typ": 32529, "value_hex": "cafebabe" }
        ]
      },
      "guard_directory": {
        "snapshot_path": "/etc/soranet/relay/guards/current_snapshot.norito",
        "expected_directory_hash_hex": "fedcba98765432100123456789abcdef0123456789abcdef0123456789abcdef",
        "allow_missing_entry": false
      }
    }
---
apiVersion: v1
kind: Secret
metadata:
  name: soranet-relay-manifest
  namespace: soranet
type: Opaque
stringData:
  relay-descriptor-manifest.json: |
    {
      "version": 1,
      "identity": {
        "ed25519_private_key_hex": "00112233445566778899aabbccddeeff00112233445566778899aabbccddeeff",
        "ml_kem_private_key_hex": "",
        "ml_kem_public_hex": ""
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: soranet-relay
  namespace: soranet
spec:
  replicas: 2
  selector:
    matchLabels:
      app: soranet-relay
  template:
    metadata:
      labels:
        app: soranet-relay
    spec:
      containers:
        - name: relay
          image: ghcr.io/sora-nexus/soranet-relay:latest
          imagePullPolicy: IfNotPresent
          args:
            - "--config"
            - "/etc/soranet/relay/relay.json"
          env:
            - name: RUST_LOG
              value: "soranet_relay=info,quinn=warn"
          ports:
            - name: quic
              containerPort: 4433
              protocol: UDP
            - name: metrics
              containerPort: 9090
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /metrics
              port: metrics
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: quic
            initialDelaySeconds: 15
            periodSeconds: 20
          volumeMounts:
            - name: config
              mountPath: /etc/soranet/relay
            - name: manifest
              mountPath: /etc/soranet/relay/secrets
              readOnly: true
            - name: audit-spool
              mountPath: /var/spool/soranet/audit
              readOnly: false
      volumes:
        - name: config
          configMap:
            name: soranet-relay-config
        - name: manifest
          secret:
            secretName: soranet-relay-manifest
        - name: audit-spool
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: soranet-relay
  namespace: soranet
spec:
  selector:
    app: soranet-relay
  ports:
    - name: quic
      port: 4433
      targetPort: quic
      protocol: UDP
    - name: metrics
      port: 9090
      targetPort: metrics
      protocol: TCP
