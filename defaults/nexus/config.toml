[ivm.banner]
show = true
beep = true

[network]
address = "addr:0.0.0.0:1337#BF18"
public_address = "addr:127.0.0.1:1337#8F78"

[torii]
address = "addr:0.0.0.0:8080#B922"

[sumeragi]
da_enabled = true

[sorafs.storage]
enabled = true

[sorafs.discovery]
discovery_enabled = true
known_capabilities = ["torii_gateway", "chunk_range_fetch"]

[sorafs.discovery.admission]
envelopes_dir = "defaults/nexus/sorafs_admission"

[sorafs.repair]
enabled = false
# db_dsn = "postgres://sorafs/sorafs_repair"
db_pool_max_connections = 8
claim_ttl_secs = 900
heartbeat_interval_secs = 60
max_attempts = 3
worker_concurrency = 4
backoff_initial_secs = 5
backoff_max_secs = 60

[sorafs.gc]
enabled = false
# db_dsn = "postgres://sorafs/sorafs_gc"
db_pool_max_connections = 4
interval_secs = 900
max_deletions_per_run = 500
retention_grace_secs = 86400
pre_admission_sweep = true

[genesis]
public_key = "ed0120CE7FA46C9DCE7EA4B125E2E36BDB63EA33073E7590AC92816AE1E861B7048B03"

[streaming]
identity_public_key = "ed01201C61FAF8FE94E253B93114240394F79A607B7FA55F9E5A41EBEC74B88055768B"
identity_private_key = "802620282ED9F3CF92811C3818DBC4AE594ED59DC1A2F78E4241E31924E101D6B1FB83"
# Advertise support for feedback hints and privacy overlay provider
feature_bits = 0b11

[streaming.soranet]
# Auto-provision manifests onto SoraNet circuits using the default Torii egress.
enabled = true
exit_multiaddr = "/dns/torii/udp/9443/quic"
padding_budget_ms = 25
access_kind = "authenticated"
provision_spool_dir = "./storage/streaming/soranet_routes"
provision_spool_max_bytes = 0
provision_window_segments = 4
provision_queue_capacity = 256

[nexus]
enabled = true
lane_count = 3

[nexus.storage]
max_disk_usage_bytes = 274877906944
max_wsv_memory_bytes = 8589934592

[nexus.storage.disk_budget_weights]
kura_blocks_bps = 3000
wsv_snapshots_bps = 2000
sorafs_bps = 4000
soranet_spool_bps = 500
soravpn_spool_bps = 500

[[nexus.lane_catalog]]
index = 0
alias = "core"
description = "Primary execution lane"
dataspace = "universal"
metadata = {}

[[nexus.lane_catalog]]
index = 1
alias = "governance"
description = "Governance & parliament traffic"
dataspace = "governance"
metadata = {}

[[nexus.lane_catalog]]
index = 2
alias = "zk"
description = "Zero-knowledge attachments"
dataspace = "zk"
metadata = {}

[[nexus.dataspace_catalog]]
alias = "universal"
id = 0
description = "Single-lane data space"
fault_tolerance = 1

[[nexus.dataspace_catalog]]
alias = "governance"
id = 1
description = "Governance proposals & manifests"
fault_tolerance = 1

[[nexus.dataspace_catalog]]
alias = "zk"
id = 2
description = "Zero-knowledge proofs and attachments"
fault_tolerance = 1

[nexus.routing_policy]
default_lane = 0
default_dataspace = "universal"

[[nexus.routing_policy.rules]]
lane = 1
dataspace = "governance"
[nexus.routing_policy.rules.matcher]
instruction = "governance"
description = "Route governance instructions to the governance lane"

[[nexus.routing_policy.rules]]
lane = 2
dataspace = "zk"
[nexus.routing_policy.rules.matcher]
instruction = "smartcontract::deploy"
description = "Route contract deployments to the zk lane for proof tracking"

[nexus.fusion]
floor_teu = 4000
exit_teu = 6000
observation_slots = 2
max_window_slots = 16

[nexus.commit]
window_slots = 2

[nexus.lane_relay_emergency]
enabled = false
multisig_threshold = 3
multisig_members = 5

[nexus.da]
q_in_slot_total = 2048
q_in_slot_per_ds_min = 8
sample_size_base = 64
sample_size_max = 96
threshold_base = 43
per_attester_shards = 25

[nexus.da.audit]
sample_size = 32
window_count = 20
interval_ms = 600000

[nexus.da.recovery]
request_timeout_ms = 86400000

[nexus.da.rotation]
max_hits_per_window = 4
window_slots = 64
seed_tag = "iroha:da:rotate:v1\u0000"
latency_decay = 0.25
