# Deploy on the edge host serving both:
# - taira.sora.org (Torii endpoint)
# - taira-explorer.sora.org (Explorer web UI)
#
# Both public hostnames should resolve to this shared edge host. The validator
# itself only needs to listen on the private Torii upstream below.
#
# The frontend build is from sibling repo ../iroha2-block-explorer-web.
# TLS is expected from one SAN cert that includes both hostnames:
# - /etc/letsencrypt/live/taira.sora.org/{fullchain.pem,privkey.pem}

upstream taira_torii_upstream {
  server 127.0.0.1:18080;
  keepalive 64;
}

server {
  listen 80;
  listen [::]:80;
  server_name taira.sora.org taira-explorer.sora.org;

  location ^~ /.well-known/acme-challenge/ {
    root /var/www/certbot;
    default_type "text/plain";
  }

  location / {
    return 301 https://$host$request_uri;
  }
}

server {
  listen 443 ssl;
  listen [::]:443 ssl;
  http2 on;
  server_name taira.sora.org;
  client_max_body_size 64m;

  ssl_certificate /etc/letsencrypt/live/taira.sora.org/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/taira.sora.org/privkey.pem;
  include /etc/letsencrypt/options-ssl-nginx.conf;
  ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

  location = /v1/connect/ws {
    proxy_pass http://taira_torii_upstream;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 3600;
    proxy_send_timeout 3600;
    proxy_buffering off;
  }

  location = /v1/mcp {
    proxy_pass http://taira_torii_upstream;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 3600;
    proxy_send_timeout 3600;
    proxy_buffering off;
  }

  location / {
    proxy_pass http://taira_torii_upstream;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 3600;
    proxy_send_timeout 3600;
    proxy_buffering off;
  }
}

server {
  listen 443 ssl;
  listen [::]:443 ssl;
  http2 on;
  server_name taira-explorer.sora.org;
  client_max_body_size 64m;

  ssl_certificate /etc/letsencrypt/live/taira.sora.org/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/taira.sora.org/privkey.pem;
  include /etc/letsencrypt/options-ssl-nginx.conf;
  ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

  root /var/www/iroha2-block-explorer-web/dist;
  index index.html;

  location / {
    try_files $uri $uri/ /index.html;
  }

  location = /v1/connect/ws {
    proxy_pass http://taira_torii_upstream;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host taira.sora.org;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 3600;
    proxy_send_timeout 3600;
    proxy_buffering off;
  }

  location = /v1/mcp {
    proxy_pass http://taira_torii_upstream;
    proxy_http_version 1.1;
    proxy_set_header Host taira.sora.org;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 3600;
    proxy_send_timeout 3600;
    proxy_buffering off;
  }

  # Explorer -> Torii pass-through for API + SSE routes.
  location ^~ /v1/ {
    proxy_pass http://taira_torii_upstream;
    proxy_http_version 1.1;
    proxy_set_header Host taira.sora.org;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 3600;
    proxy_send_timeout 3600;
    proxy_buffering off;
  }
}
