# Copy this file to a user-local path such as
# `configs/soranexus/taira/validator_roster.local.toml`, replace every
# placeholder, and keep the populated file out of the repo. Keep the matching
# private keys in `validator_secrets.local.toml`, not here.
#
# Then render one config.toml per validator:
#   python3 scripts/render_taira_validator_bundle.py \
#     --roster configs/soranexus/taira/validator_roster.local.toml \
#     --secrets configs/soranexus/taira/validator_secrets.local.toml \
#     --output-dir dist/taira-validators
#
# Every validator must set its own `torii_public_address`. Direct per-node Torii
# ingress is canonical for Taira; `https://taira.sora.org` is convenience-only.

network_address = "0.0.0.0:1337"
torii_address = "0.0.0.0:18080"

[[validators]]
slug = "taira-validator-1"
public_key = "REPLACE_WITH_BLS_PUBLIC_KEY_1"
pop_hex = "REPLACE_WITH_BLS_POP_HEX_1"
public_address = "taira-validator-1.sora.org:1337"
torii_public_address = "https://taira-validator-1.sora.org"

