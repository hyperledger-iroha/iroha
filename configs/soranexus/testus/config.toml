[ivm.banner]
show = true
beep = true

[network]
address = "0.0.0.0:1337"
public_address = "testus.mof3.sora.org:1337"

[torii]
address = "0.0.0.0:18080"
public_address = "https://testus.mof3.sora.org:18080"

[torii.sorafs]
discovery_enabled = true
known_capabilities = ["torii_gateway", "chunk_range_fetch"]
admission_envelopes_dir = "configs/soranexus/testus/sorafs_admission"

[sorafs.repair]
enabled = false
# state_dir = "./storage/sorafs/repair"
claim_ttl_secs = 900
heartbeat_interval_secs = 60
max_attempts = 3
worker_concurrency = 4
backoff_initial_secs = 5
backoff_max_secs = 60

[sorafs.gc]
enabled = false
# state_dir = "./storage/sorafs/gc"
interval_secs = 900
max_deletions_per_run = 500
retention_grace_secs = 86400
pre_admission_sweep = true

[sumeragi]
da_enabled = true

[genesis]
public_key = "ed0120CE7FA46C9DCE7EA4B125E2E36BDB63EA33073E7590AC92816AE1E861B7048B03"

[streaming]
identity_public_key = "ed01201C61FAF8FE94E253B93114240394F79A607B7FA55F9E5A41EBEC74B88055768B"
identity_private_key = "802620282ED9F3CF92811C3818DBC4AE594ED59DC1A2F78E4241E31924E101D6B1FB83"
feature_bits = 0b11

[nexus]
lane_count = 3

[[nexus.lane_catalog]]
index = 0
alias = "core"
description = "Primary execution lane"
dataspace = "universal"

[[nexus.lane_catalog]]
index = 1
alias = "governance"
description = "Governance & parliament traffic"
dataspace = "governance"

[[nexus.lane_catalog]]
index = 2
alias = "zk"
description = "Zero-knowledge attachments"
dataspace = "zk"

[[nexus.dataspace_catalog]]
alias = "universal"
id = 0
description = "Single-lane data space"

[[nexus.dataspace_catalog]]
alias = "governance"
id = 1
description = "Governance proposals & manifests"

[[nexus.dataspace_catalog]]
alias = "zk"
id = 2
description = "Zero-knowledge proofs and attachments"

[nexus.routing_policy]
default_lane = 0
default_dataspace = "universal"

[[nexus.routing_policy.rules]]
lane = 1
dataspace = "governance"
[nexus.routing_policy.rules.matcher]
instruction = "governance"
description = "Route governance instructions to the governance lane"

[[nexus.routing_policy.rules]]
lane = 2
dataspace = "zk"
[nexus.routing_policy.rules.matcher]
instruction = "smartcontract::deploy"
description = "Route contract deployments to the zk lane for proof tracking"

[nexus.fusion]
floor_teu = 2500
exit_teu = 4000
observation_slots = 2
max_window_slots = 12

[nexus.commit]
window_slots = 2

[nexus.da]
q_in_slot_total = 1024
q_in_slot_per_ds_min = 4
sample_size_base = 48
sample_size_max = 64
threshold_base = 32
per_attester_shards = 16

[nexus.da.audit]
sample_size = 16
window_count = 12
interval_ms = 600000

[nexus.da.recovery]
request_timeout_ms = 43200000

[nexus.da.rotation]
max_hits_per_window = 4
window_slots = 48
seed_tag = "iroha:da:rotate:v1\0"
latency_decay = 0.25
