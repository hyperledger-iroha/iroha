[[runner]]
label = "libaom-objective-1-fast"
command = [
  "bash",
  "benchmarks/nsc/run_reference_codec.sh",
  "--codec", "libaom",
  "--clip-set", "objective-1-fast",
  "--clips", "{clips}",
  "--csv", "{csv}",
  "--tables", "{tables}",
  "--output", "{output}/libaom-objective-1-fast",
  "--bitstreams", "{output}/bitstreams"
]

