[metadata]
name = iroha-norito
version = 0.1.0
description = Pure-Python implementation of the Norito serialization codec
long_description = file: README.md
long_description_content_type = text/markdown
author = Hyperledger Iroha Contributors
license = Apache-2.0
url = https://github.com/hyperledger/iroha
keywords = iroha, norito, serialization, blockchain
classifiers =
    Development Status :: 3 - Alpha
    Intended Audience :: Developers
    License :: OSI Approved :: Apache Software License
    Programming Language :: Python
    Programming Language :: Python :: 3
    Programming Language :: Python :: 3.9
    Programming Language :: Python :: 3.10
    Programming Language :: Python :: 3.11
    Programming Language :: Python :: 3.12
    Topic :: Software Development :: Libraries :: Python Modules

[options]
package_dir =
    = src
packages = find:
python_requires = >=3.9
include_package_data = True

[options.packages.find]
where = src

[options.entry_points]
console_scripts =
    norito-dump = norito.cli:main

[options.extras_require]
compression =
    zstandard>=0.22.0
