[package]
name = "iroha_python_rs"
version = "0.0.1"
edition = "2024"

[lib]
name = "iroha_python_rs"
crate-type = ["cdylib"]

[dependencies]
iroha_crypto = { path = "../../../crates/iroha_crypto", features = ["sm"] }
iroha_data_model = { path = "../../../crates/iroha_data_model", features = ["json"] }
iroha_primitives = { path = "../../../crates/iroha_primitives" }
iroha_schema = { path = "../../../crates/iroha_schema" }
iroha_version = { path = "../../../crates/iroha_version" }
iroha_torii_shared = { path = "../../../crates/iroha_torii_shared" }
norito = { path = "../../../crates/norito" }
ivm = { path = "../../../crates/ivm" }
sorafs_manifest = { path = "../../../crates/sorafs_manifest" }
iroha_config = { path = "../../../crates/iroha_config" }
sorafs_car = { path = "../../../crates/sorafs_car" }
sorafs_chunker = { path = "../../../crates/sorafs_chunker" }
sorafs_orchestrator = { path = "../../../crates/sorafs_orchestrator" }
pyo3 = { version = "0.27.1", features = ["extension-module", "abi3-py39"] }
rand_core_06 = { workspace = true }
hex = "0.4.3"
base64 = "0.22.1"
x25519-dalek = "2.0.1"
futures = { workspace = true }
blake3 = { workspace = true }
tokio = { workspace = true, features = ["rt-multi-thread"] }

[build-dependencies]
pyo3-build-config = "0.27.1"

[dev-dependencies]
once_cell = "1.21.3"
tempfile = { workspace = true }
httpmock = "0.8.2"
ed25519-dalek = "2.2.0"
http = { workspace = true }

[package.metadata.maturin]
name = "iroha_python._crypto"
