name: pr_csharp

on:
  pull_request:
    paths:
      - ".github/workflows/pr_csharp.yml"
      - "csharp/**"
      - "fixtures/account/address_vectors.json"
  workflow_dispatch:

jobs:
  build-test-pack:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: csharp
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore Hyperledger.Iroha.Sdk.sln

      - name: Build
        run: dotnet build Hyperledger.Iroha.Sdk.sln -c Release --no-restore

      - name: Test
        run: dotnet test Hyperledger.Iroha.Sdk.sln -c Release --no-build

      - name: Pack
        run: dotnet pack src/Hyperledger.Iroha.Sdk/Hyperledger.Iroha.Sdk.csproj -c Release --no-build
