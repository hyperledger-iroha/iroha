api-changes:
  - all:
    - base-branch: 'main'
    - changed-files:
      - any-glob-to-any-file:
        - 'docs/source/references/schema.json'
        - 'crates/iroha_torii/src/**'
        - 'crates/iroha_torii_shared/src/**'

config-changes:
  - all:
    - base-branch: 'main'
    - changed-files:
      - any-glob-to-any-file:
        - 'configs/**'
        - 'defaults/**'
        - 'docs/source/references/*.template.*'
