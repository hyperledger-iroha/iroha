[package]
name = "mochi-integration"
version = "0.1.0"
edition = "2024"
publish = false
license = "Apache-2.0"
description = "Integration harnesses for the MOCHI supervisor and Torii client."

[lib]
path = "src/lib.rs"

[[bin]]
name = "kagami_mock"
path = "src/bin/kagami_mock.rs"

[dependencies]
color-eyre = { workspace = true }
eyre = { workspace = true }
axum = { workspace = true, features = ["http1", "macros", "tokio", "ws"] }
iroha_crypto = { workspace = true, features = ["std"] }
iroha_data_model = { workspace = true, features = ["json"] }
iroha_telemetry = { workspace = true }
mochi-core = { path = "../mochi-core" }
parking_lot = { workspace = true }
norito = { workspace = true, features = ["json", "json-std-io"] }
tokio = { workspace = true, features = ["macros", "net", "rt", "rt-multi-thread", "sync", "time"] }

[dev-dependencies]
tempfile = { workspace = true }
toml = { workspace = true }
