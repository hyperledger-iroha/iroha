        - generic [ref=e1411]:
          - heading "Frequently asked questions" [level=2] [ref=e1412]
          - paragraph [ref=e1413]: Everything you need to know about making music with Suno.
        - generic [ref=e1414]:
          - generic [ref=e1415]:
            - heading "Why is Suno the best AI music generator?" [level=3] [ref=e1416]:
              - button "Why is Suno the best AI music generator?" [ref=e1417] [cursor=pointer]:
                - generic [ref=e1418]: Why is Suno the best AI music generator?
                - generic [ref=e1419]: +
            - paragraph [ref=e1420]: Most AI music generators produce short instrumental loops. Suno helps you create complete, original songs – vocals, lyrics, full production – from a single text prompt in under a minute, across every genre. Featured in Rolling Stone, Billboard, Wired, and Variety, Suno is used by everyone from first-time creators to top producers and songwriters. We're a top 10 music app on iOS and Android.
          - generic [ref=e1421]:
            - heading "How do I make a song with Suno?" [level=3] [ref=e1422]:
              - button "How do I make a song with Suno?" [ref=e1423] [cursor=pointer]:
                - generic [ref=e1424]: How do I make a song with Suno?
                - generic [ref=e1425]: +
            - paragraph [ref=e1426]: Go to suno.com, describe the song you want – genre, mood, theme, or your own lyrics – and hit Create. Suno helps you build a complete track with vocals, instrumentation, and production in under a minute. Regenerate, extend, or refine from there. Whether you're after a full song or just an instrumental, Suno works as a beat maker, AI song generator and song creator in one.
          - generic [ref=e1427]:
            - heading "Do I need any music experience to use Suno?" [level=3] [ref=e1428]:
              - button "Do I need any music experience to use Suno?" [ref=e1429] [cursor=pointer]:
                - generic [ref=e1430]: Do I need any music experience to use Suno?
                - generic [ref=e1431]: +
            - paragraph [ref=e1432]: "No experience needed. Suno is built for everyone – people making music for the first time and chart-topping pros alike. Describe what you want in plain language: a genre, a mood, a topic, even a few lyrics. From there, you shape the melody, harmony, vocals, and production into exactly what you're hearing in your head."
          - generic [ref=e1433]:
            - heading "Can I use AI to make music?" [level=3] [ref=e1434]:
              - button "Can I use AI to make music?" [ref=e1435] [cursor=pointer]:
                - generic [ref=e1436]: Can I use AI to make music?
                - generic [ref=e1437]: +
            - paragraph [ref=e1438]: "Yes. With Suno's AI song generator, you can create complete, original songs just by describing what you want. Type a genre, a mood, an idea – \"chill lo-fi beat about rainy mornings\" – and Suno helps you build a full track with vocals, lyrics, and production in seconds. Millions of people are already using AI to make music: for fun, for content, for professional projects."
          - generic [ref=e1439]:
            - heading "Is Suno free to use?" [level=3] [ref=e1440]:
              - button "Is Suno free to use?" [ref=e1441] [cursor=pointer]:
                - generic [ref=e1442]: Is Suno free to use?
                - generic [ref=e1443]: +
            - paragraph [ref=e1444]: Yes. Suno is a free AI music generator that lets you create up to 10 songs a day, no credit card required. When you're ready to go further, paid plans unlock more. The Pro plan ($10/month) gives you 500 songs a month, royalty free music, access to v5.5 - Suno's best and most personalized AI music model – commercial use rights, priority generation, the Song Editor, stem separation into vocal and instrument stems, and audio uploads of up to 8 minutes. It's the go-to plan for content creators, songwriters, and anyone looking for royalty free music for YouTube, podcasts, ads, or any commercial project. The Premier plan ($30/month) is built for serious creators and producers. On top of everything in Pro, you get 2,000 songs a month, access to Suno Studio – the first-ever generative audio workstation – a multitrack editor, MIDI export, persona voices, and early access to new features. It's a full AI music production suite in your browser. Both paid plans are available at a 20% discount with annual billing.
