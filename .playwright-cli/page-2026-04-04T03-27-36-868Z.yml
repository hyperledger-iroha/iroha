        - heading "Everything you need to make music your way" [level=1] [ref=e935]
        - generic [ref=e938]:
          - generic [ref=e941]:
            - heading "10 free songs, daily" [level=3] [ref=e942]
            - generic [ref=e943]: Turn any moment into customized music instantly — from your commute to inside jokes. Express what words can’t. Free forever, no subscription needed.
          - generic [ref=e947]:
            - heading "Free AI music generator" [level=3] [ref=e948]
            - generic [ref=e949]: Discover what’s possible when anyone can make music. Access the market-leading AI song generator to explore millions of songs—remixes, jokes, and raw emotion.
          - generic [ref=e953]:
            - heading "Share it with the world" [level=3] [ref=e954]
            - generic [ref=e955]: Make music that matters to you, then share it with people who’ll feel it too. From your inner circle to millions of music fans, your next track can go far.
        - generic [ref=e959]:
          - generic [ref=e962]:
            - heading "Granular creation controls" [level=3] [ref=e963]
            - generic [ref=e964]: Steer your style with Voices, Inspo, exclusions, and vocal gender. Or get even more granular and experiment with weirdness and style sliders.
          - generic [ref=e968]:
            - heading "Commercial rights to your songs" [level=3] [ref=e969]
            - generic [ref=e970]: Songs you create as a paid Suno subscriber are yours to keep and do whatever you want with them, from using them as background music in videos to publishing an album.
          - generic [ref=e974]:
            - heading "Your complete creative workspace" [level=3] [ref=e975]
            - generic [ref=e976]: Suno Studio is a first-of-its-kind web-based generative audio workstation that combines traditional DAW functionality with AI-powered music creation.
        - generic [ref=e980]:
          - generic [ref=e983]:
            - heading "Experience the modern song maker" [level=3] [ref=e984]
            - generic [ref=e985]: Start, edit, remix—your way. Upload or record your own audio, rewrite lyrics, reorder sections, and reimagine your sound with powerful creative tools.
          - generic [ref=e989]:
            - heading "Create everyday. Keep it all." [level=3] [ref=e990]
            - generic [ref=e991]: Make up to 500 custom songs a month, with full commercial rights on the Pro plan. Get inspired, break genre boundaries, and own what you generate—no strings attached.
          - generic [ref=e995]:
            - heading "Extract stems. Drop into your DAW." [level=3] [ref=e996]
            - generic [ref=e997]: Export up to 12 time-aligned WAV stems and use them seamlessly in Ableton, Logic, or any DAW. Clean, structured, and ready for pro workflows.
