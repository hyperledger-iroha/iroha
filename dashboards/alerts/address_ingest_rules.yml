groups:
  - name: torii-address-ingest
    interval: 1m
    rules:
      - alert: AddressLocal12Collision
        expr: sum by (context) (increase(torii_address_collision_total{kind="local12_digest",context!~"/tests/.*"}[5m])) > bool 0
        for: 5m
        labels:
          severity: page
        annotations:
          summary: "Local-12 selector collision detected"
          description: |
            Multiple Local-12 labels resolved to the same digest (context={{ $labels.context }}).
            Halt manifest promotions, audit the Local-12 registry entry, and follow the collision
            playbook before resuming CI/CD rollouts.
      - alert: AddressLocal12Traffic
        expr: sum by (context) (increase(torii_address_domain_total{domain_kind="local12",context!~"/tests/.*"}[15m])) > bool 0
        for: 10m
        labels:
          severity: page
        annotations:
          summary: "Local-12 selectors observed in production"
          description: |
            Torii still receives Local-12 selectors (context={{ $labels.context }}). Block production
            rollouts and work with the offending client to migrate to IH58/compressed or global
            selectors before re-attempting the retirement gate.
      - alert: AddressInvalidRatioSlo
        expr: |
          (
            sum(rate(torii_address_invalid_total[15m]))
              / clamp_min(sum(rate(torii_http_requests_total[15m])), 1)
          ) > 0.001
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Address ingest invalid ratio exceeds 0.1% SLO"
          description: |
            Invalid IH58/compressed submissions are above the 0.1% error budget. Inspect
            `torii_address_invalid_total` by context/reason on `address_ingest.json` and coordinate with
            the owning SDK before declaring the incident resolved.
