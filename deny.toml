[graph]
targets = []
all-features = false
no-default-features = false

[output]
feature-depth = 1

[advisories]
ignore = [
    { id = "RUSTSEC-2024-0388", reason = "Transitive arkworks/w3f-bls proc-macro debt; no safe upgrade is currently available and the workspace does not use derivative directly." },
    { id = "RUSTSEC-2024-0436", reason = "Transitive proc-macro debt from pqcrypto-mldsa, halo2curves, parquet, and ratatui; no safe upgrade is currently available without vendoring or replacing multiple upstream stacks." },
]
unmaintained = "all"
yanked = "warn"

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
]
confidence-threshold = 0.8
exceptions = []

[licenses.private]
ignore = false
registries = []

[bans]
multiple-versions = "warn"
wildcards = "allow"
highlight = "all"
workspace-default-features = "allow"
external-default-features = "allow"
allow = []
allow-workspace = false
deny = []
skip = []
skip-tree = []

[sources]
unknown-registry = "warn"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []

[sources.allow-org]
github = []
gitlab = []
bitbucket = []
